<!DOCTYPE html>
<html>

<head>
    <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@100..900&display=swap" rel="stylesheet">
    <meta charset="UTF-8">
    <title>Welcome to Scholar's Nest™</title>

    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            background: #245401;
            font-family: "Raleway", sans-serif;
            color: #2b6502;
            transition: background 1s, color 1s;
        }

        .word {
            font-size: clamp(6rem, 20vw, 20rem);
            /* Responsive scaling */
            font-weight: 800;
            padding: 0;
            margin: 0;
            /* Removes extra vertical spacing */
            line-height: 0.7;
            /* Tightens the vertical gap */
            display: inline-block;
            /* Makes stacking tighter */
            position: relative;
            white-space: nowrap;
            text-align: left;
            transition: opacity 1s;
        }



        /* COMMENT: To bring words closer to center, reduce this number (closer to 0 = closer to center) */
        .meet-offset {
            --meet-offset: 0.01;
            /* 2% of animation duration. Previously 0.05. Change here. */
        }

        #final-display {
            display: none;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, 100%);
            opacity: 0;
            transition: opacity 2s, transform 2.5s ease-out;
            /* smooth easing */
        }

        /* Elastic slide-left effect (spring style) */
        #final-display.elastic-left {
            transform: translate(calc(-50% - var(--logo-shift)), -50%) scale(1);
            transition: transform 2.5s cubic-bezier(.34, 1.56, .64, 1);
            /* elastic */
        }

        #text {
            margin-left: 20px !important;
            /* space from grey line */
        }

        #logo {
            width: clamp(120px, 20vw, 200px);
            /* responsive */
            height: auto;
            transition: transform 1s ease-out;
        }

        /* Initial centered state: logo only */
        #final-display {
            display: none;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, 100%);
            opacity: 0;
            justify-content: center;
            /* IMPORTANT */
            transition: opacity 1s, transform 1.5s ease-out;
        }

        /* After fade-in -> slide left (elastic) */
        #final-display.slide-left {
            transform: translate(calc(-50% - var(--shift-left)), -50%);
            transition: transform 1.2s cubic-bezier(.34, 1.56, .64, 1);
        }
    </style>
</head>

<body>

    <div id="scholars" class="word meet-offset">Scholar’s</div>
    <div id="nest" class="word meet-offset">
        <span style="color: inherit; -webkit-text-fill-color: transparent; -webkit-text-stroke: 4px currentColor;">
            Nest™
        </span>
    </div>

    <div id="final-display" style="display:flex; align-items:center; justify-content:center; gap:0;">
        <img id="logo" src="docs/assets/NEST LOGO 1.png" alt="Logo">
        <div id="line" style="width:2px; height:200px; background:grey; opacity:0; transition:opacity 0.5s;"></div>
        <div id="text" style="opacity:0; font-size:3rem; font-weight:bold; transition:opacity 1s;">
            Scholar's <br> Nest™
        </div>
    </div>


    <script>
        // ---------------------------------------------
        // INITIAL SETUP
        // ---------------------------------------------
        const scholars = document.getElementById("scholars");
        const nest = document.getElementById("nest");
        const meetingOffset = parseFloat(getComputedStyle(scholars).getPropertyValue("--meet-offset"));
        const totalDistance = window.innerWidth + 100;

        const duration = 20000;

        // ---------------------------------------------
        // ANIMATIONS (start far → meet center → move out)
        // ---------------------------------------------
        const kf_scholars = [
            { transform: `translateX(${-totalDistance}px)` },
            { transform: `translateX(0px)`, offset: meetingOffset }, /* They meet here */
            { transform: `translateX(${totalDistance}px)` }
        ];

        const kf_nest = [
            { transform: `translateX(${totalDistance}px)` },
            { transform: `translateX(0px)`, offset: meetingOffset }, /* They meet here */
            { transform: `translateX(${-totalDistance}px)` }
        ];

        const animA = scholars.animate(kf_scholars, {
            duration,
            easing: "ease-out",
            fill: "forwards"
        });

        const animB = nest.animate(kf_nest, {
            duration,
            easing: "ease-out",
            fill: "forwards"
        });

        // ---------------------------------------------
        // SPEED RAMP
        // ---------------------------------------------
        setTimeout(() => {
            animA.playbackRate = 0.1;
            animB.playbackRate = 0.1;
        }, duration * meetingOffset);

        setTimeout(() => {
            document.body.style.background = '#ffffff';
            document.body.style.color = '#a1a1a1';
        }, duration * meetingOffset + 2500);

        setTimeout(() => {
            animA.playbackRate = 1;
            animB.playbackRate = 1;
        }, duration * meetingOffset + 5000);

        // FADE WORDS OUT → FADE LOGO IN CENTER → THEN SLIDE LEFT
        setTimeout(() => {

            scholars.style.opacity = "0";
            nest.style.opacity = "0";

            const display = document.getElementById("final-display");
            display.style.display = "flex";

            // --- PHASE 1: fade in logo at *true screen center* ---
            display.style.justifyContent = "center";     // KEEP LOGO IN CENTER
            display.style.transform = "translate(-50%, -50%)";
            display.style.opacity = "1";

            // Run only AFTER fade-in completes (delay = 1s)
            setTimeout(() => {

                // Calculate dynamic shift so the grey line ends up at the screen center
                const logo = document.getElementById("logo");
                const shift = logo.getBoundingClientRect().width * 0.8;  // tweak factor if needed
                document.documentElement.style.setProperty("--shift-left", shift + "px");

                // --- PHASE 2: slide the whole block left (elastic) ---
                display.classList.add("slide-left");

                // After slide begins → switch layout alignment
                setTimeout(() => {
                    display.style.justifyContent = "flex-start";

                    // Show line
                    setTimeout(() => {
                        document.getElementById("line").style.opacity = "1";

                        // Show text
                        setTimeout(() => {
                            document.getElementById("text").style.opacity = "1";
                        }, 400);

                    }, 300);

                }, 200);

            }, 1000); // Wait for fade-in to complete

        }, duration * meetingOffset + 5000);

    </script>

</body>

</html>
