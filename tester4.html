<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Raleway:wght@100..900&display=swap" rel="stylesheet">
<title>Smooth Logo Slide with Center Line</title>

<style>
body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
    background: #ffffff;
    font-family: "Raleway", sans-serif;
}

/* Container */
#final-display {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    opacity: 0;
    display: flex;
    align-items: center;
    gap: 0;

    /* Smooth transitions */
    transition:
        opacity 1.8s ease-in-out,       /* fade-in starts slow, ends smooth */
        left 2.5s ease-in-out;  /* smooth slide left */
}

/* Logo */
#logo {
    width: 200px;
    height: auto;
    transition: transform 1.4s ease-in-out;
}

/* Vertical line */
#line {
    width: 2px;
    background: grey;
    opacity: 0;
    transition:
        height 1.6s ease,
        opacity 1.6s ease-in-out;      /* fade in smooth */
}

/* Text */
#text {
    font-size: 3rem;
    font-weight: 500;
    color: #245401;
    opacity: 0;
    margin-left: 20px;
    transition: opacity 1.8s ease-in-out;  /* fade in smooth with ease-in-out */
}
</style>
</head>
<body>

<div id="final-display">
    <img id="logo" src="docs/assets/NEST LOGO 1.png" alt="Logo">
</div>

<script>
window.onload = () => {
    const finalDisplay = document.getElementById("final-display");
    const logo = document.getElementById("logo");

    // PHASE 1: Fade in logo centered
    setTimeout(() => {
        finalDisplay.style.opacity = "1";  // ease-in-out applies here
    }, 100);

    // PHASE 2: After 2s, slide container left & reveal line + text
    setTimeout(() => {

        // Create line + text
        const line = document.createElement("div");
        line.id = "line";

        const text = document.createElement("div");
        text.id = "text";
        text.innerHTML = "Scholar's <br> Nest™";

        finalDisplay.appendChild(line);
        finalDisplay.appendChild(text);

        // Match line height to logo
        const logoHeight = logo.getBoundingClientRect().height;
        line.style.height = logoHeight + "px";

        // Expand spacing smoothly
        finalDisplay.style.gap = "10px";

        // Calculate exact shift in px so the line is at screen center
        const amount = logo.getBoundingClientRect().width + 20 + (line.getBoundingClientRect().width / 1);
        finalDisplay.style.left = `calc(50% - ${amount}px)`;

        // Optional subtle elastic bump on logo (after half slide)
        setTimeout(() => {
            logo.style.transform = "scale(1.01)";
        }, 1200);
        setTimeout(() => {
            logo.style.transform = "scale(1)";
        }, 1800);

        // Fade in line and text simultaneously
        setTimeout(() => {
            line.style.opacity = "1";
            text.style.opacity = "1";
        }, 400);

    }, 2000);
};
</script>

</body>
</html>
